<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="P.L. Vinovo"/>
<meta name="theme-color" content="#F7F4EF"/>
<title>P.L. Vinovo - Monitor</title>

<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22 fill=%22%231C1814%22><rect width=%22100%22 height=%22100%22 rx=%2222%22/><circle cx=%2250%22 cy=%2250%22 r=%2235%22 fill=%22%23C8321A%22/><path d=%22M35 42h30v20H35z%22 fill=%22white%22/><circle cx=%2242%22 cy=%2270%22 r=%225%22 fill=%22white%22/><circle cx=%2258%22 cy=%2270%22 r=%225%22 fill=%22white%22/><path d=%22M25 50h50M50 25v50%22 stroke=%22%23F7F4EF%22 stroke-width=%224%22/></svg>">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22 fill=%22%231C1814%22><rect width=%22100%22 height=%22100%22 rx=%2222%22/><circle cx=%2250%22 cy=%2250%22 r=%2235%22 fill=%22%23C8321A%22/><path d=%22M35 42h30v20H35z%22 fill=%22white%22/><circle cx=%2242%22 cy=%2270%22 r=%225%22 fill=%22white%22/><circle cx=%2258%22 cy=%2270%22 r=%225%22 fill=%22white%22/><path d=%22M25 50h50M50 25v50%22 stroke=%22%23F7F4EF%22 stroke-width=%224%22/></svg>">

<style>
:root {
  --paper:    #F7F4EF;
  --paper2:   #EEE9E1;
  --ink:      #1C1814;
  --inkSoft:  #5C5448;
  --inkFaint: #A09888;
  --border:   #D8D0C4;
  --red:      #C8321A;
  --green:    #1A7A3C;
  --blue:     #1A5A9A;
  --blueLo:   #E4EEF8;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
body { background: var(--paper); color: var(--ink); display: flex; justify-content: center; }
#app { width: 100%; max-width: 480px; min-height: 100vh; background: var(--paper); display: flex; flex-direction: column; border-shadow: 0 0 10px rgba(0,0,0,0.05); }

/* Header */
#header { padding: 16px 20px; border-bottom: 2px solid var(--ink); }
.h-title { font-size: 24px; font-weight: bold; }
.h-title em { font-style: normal; color: var(--blue); }
.h-sub { font-size: 11px; color: var(--inkFaint); margin-top: 4px; font-family: monospace; }

/* Stato Passaggio a Livello */
#stato { padding: 12px 20px; display: flex; align-items: center; gap: 10px; background: #FFF; border-bottom: 1px solid var(--border); }
#stato-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--green); }
#stato-txt { font-size: 13px; font-weight: bold; font-family: monospace; }

/* Box Mappa Compatta */
#map-wrap { width: 100%; background: #EBF0F5; border-bottom: 1px solid var(--border); position: relative; }
#map-svg { display: block; width: 100%; height: auto; }

/* Lista Treni */
#lista { flex: 1; padding: 10px 0; }
.t-card { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--paper2); }
.t-main { display: flex; flex-direction: column; gap: 4px; }
.t-linea { font-size: 11px; font-weight: bold; background: var(--blueLo); color: var(--blue); padding: 2px 6px; border-radius: 4px; width: fit-content; font-family: monospace; }
.t-dir { font-size: 14px; font-weight: bold; }
.t-ora { font-size: 11px; color: var(--inkSoft); font-family: monospace; }
.t-tempo { text-align: right; }
.t-min { font-size: 20px; font-weight: bold; color: var(--ink); }
.t-lbl { font-size: 10px; color: var(--inkFaint); font-family: monospace; display: block; }

#footer { padding: 15px; font-size: 10px; color: var(--inkFaint); text-align: center; line-height: 1.4; background: var(--paper2); }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="h-title">P.L. <em>Vinovo</em></div>
    <div class="h-sub">SP143 · KM 5+806 · Orario SFM2</div>
  </div>

  <div id="stato">
    <div id="stato-dot"></div>
    <div id="stato-txt">Calcolo in corso...</div>
  </div>

  <div id="map-wrap">
    <svg id="map-svg" viewBox="0 0 360 130" xmlns="http://www.w3.org/2000/svg">
      <rect width="360" height="130" fill="#EBF0F5"/>
      <path d="M0,80 Q90,75 180,85 T360,78" fill="none" stroke="#C2D5E7" stroke-width="3"/>
      <circle cx="180" cy="65" r="30" fill="#E3DDD3" opacity="0.5"/>
      <circle cx="60" cy="50" r="20" fill="#E3DDD3" opacity="0.4"/>
      <line x1="0" y1="65" x2="360" y2="65" stroke="#524430" stroke-width="3"/>
      <line x1="0" y1="65" x2="360" y2="65" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="5,5"/>
      <circle cx="60" cy="65" r="4" fill="white" stroke="#524430" stroke-width="1.5"/>
      <text x="60" y="55" font-size="8" text-anchor="middle" font-weight="bold" fill="#5C5448">Candiolo</text>
      <circle cx="300" cy="65" r="4" fill="white" stroke="#524430" stroke-width="1.5"/>
      <text x="300" y="55" font-size="8" text-anchor="middle" font-weight="bold" fill="#5C5448">Nichelino</text>
      <circle cx="180" cy="65" r="6" fill="#C8321A" stroke="white" stroke-width="1.5"/>
      <text x="180" y="82" font-size="9" text-anchor="middle" font-weight="bold" fill="#C8321A">P.L. VINOVO</text>
    </svg>
  </div>

  <div id="lista"></div>

  <div id="footer">
    <p>Orario ufficiale completo senza interruzioni.<br>Verificare sempre i segnali stradali sul posto.</p>
  </div>
</div>

<script>
// Database Blindato dei passaggi esatti al P.L. di Vinovo (24 per direzione)
const ORARI_PL = [
  // Verso Chivasso (Orario di arrivo stimato al PL)
  {d:'Chivasso', o:'05:44'}, {d:'Chivasso', o:'06:14'}, {d:'Chivasso', o:'06:44'}, {d:'Chivasso', o:'07:14'},
  {d:'Chivasso', o:'07:44'}, {d:'Chivasso', o:'08:14'}, {d:'Chivasso', o:'08:44'}, {d:'Chivasso', o:'09:44'},
  {d:'Chivasso', o:'10:44'}, {d:'Chivasso', o:'11:44'}, {d:'Chivasso', o:'12:44'}, {d:'Chivasso', o:'13:44'},
  {d:'Chivasso', o:'14:44'}, {d:'Chivasso', o:'15:44'}, {d:'Chivasso', o:'16:14'}, {d:'Chivasso', o:'16:44'},
  {d:'Chivasso', o:'17:14'}, {d:'Chivasso', o:'17:44'}, {d:'Chivasso', o:'18:14'}, {d:'Chivasso', o:'18:44'},
  {d:'Chivasso', o:'19:44'}, {d:'Chivasso', o:'20:44'}, {d:'Chivasso', o:'21:44'}, {d:'Chivasso', o:'22:44'},

  // Verso Pinerolo (Orario di arrivo stimato al PL)
  {d:'Pinerolo', o:'05:58'}, {d:'Pinerolo', o:'06:28'}, {d:'Pinerolo', o:'06:58'}, {d:'Pinerolo', o:'07:28'},
  {d:'Pinerolo', o:'07:58'}, {d:'Pinerolo', o:'08:28'}, {d:'Pinerolo', o:'08:58'}, {d:'Pinerolo', o:'09:58'},
  {d:'Pinerolo', o:'10:58'}, {d:'Pinerolo', o:'11:58'}, {d:'Pinerolo', o:'12:58'}, {d:'Pinerolo', o:'13:58'},
  {d:'Pinerolo', o:'14:58'}, {d:'Pinerolo', o:'15:58'}, {d:'Pinerolo', o:'16:28'}, {d:'Pinerolo', o:'16:28'},
  {d:'Pinerolo', o:'17:28'}, {d:'Pinerolo', o:'17:58'}, {d:'Pinerolo', o:'18:28'}, {d:'Pinerolo', o:'18:58'},
  {d:'Pinerolo', o:'19:58'}, {d:'Pinerolo', o:'20:58'}, {d:'Pinerolo', o:'21:58'}, {d:'Pinerolo', o:'22:58'}
];

function calcolaMinuti(oraStr) {
  const adesso = new Date();
  const [h, m] = oraStr.split(':').map(Number);
  const target = new Date(adesso);
  target.setHours(h, m, 0, 0);
  
  if (target < adesso) {
    target.setDate(target.getDate() + 1); // Se l'orario è già passato, si riferisce a domani
  }
  return Math.round((target - adesso) / 60000);
}

function aggiornaApp() {
  const listaEl = document.getElementById('lista');
  
  // Mappa i treni calcolando quanti minuti mancano
  let treni = ORARI_PL.map(t => {
    return { dir: t.d, ora: t.o, min: calcolaMinuti(t.o) };
  });

  // Ordina dal più vicino al più lontano
  treni.sort((a, b) => a.min - b.min);

  // Prendi solo i primi 5 più vicini
  const prossimi = treni.slice(0, 5);

  // Aggiorna lo Stato del PL basandosi sul treno più vicino
  const piuVicino = prossimi[0];
  const dot = document.getElementById('stato-dot');
  const txt = document.getElementById('stato-txt');

  if (piuVicino && piuVicino.min <= 4) {
    dot.style.background = 'var(--red)';
    txt.style.color = 'var(--red)';
    txt.textContent = `BARRIERE CHIUSE (Treno per ${piuVicino.dir} in transito)`;
  } else if (piuVicino && piuVicino.min stroke-width<= 8) {
    dot.style.background = 'var(--amber)';
    txt.style.color = 'var(--amber)';
    txt.textContent = `IN ARRIVO (Chiusura barriere tra ${piuVicino.min - 4} min)`;
  } else {
    dot.style.background = 'var(--green)';
    txt.style.color = 'var(--green)';
    txt.textContent = "BARRIERE APERTE (Via libera)";
  }

  // Genera il codice HTML per la lista
  let html = '';
  prossimi.forEach(t => {
    html += `
      <div class="t-card">
        <div class="t-main">
          <span class="t-linea">SFM2</span>
          <span class="t-dir">${t.dir === 'Chivasso' ? '▶ Chivasso' : '◀ Pinerolo'}</span>
          <span class="t-ora">Transito previsto: ${t.ora}</span>
        </div>
        <div class="t-tempo">
          <span class="t-min">${t.min}</span>
          <span class="t-lbl">minuti</span>
        </div>
      </div>
    `;
  });

  listaEl.innerHTML = html;
}

// Avvia l'applicazione e aggiorna ogni 30 secondi automaticamente
aggiornaApp();
setInterval(aggiornaApp, 30000);
</script>

</body>
</html>
