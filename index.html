<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>P.L. Vinovo</title>
<style>
:root { --paper:#F7F4EF; --ink:#1C1814; --blue:#1A5A9A; --merci:#8A4A10; --border:#D8D0C4; }
body { margin:0; background:var(--paper); font-family:'DM Mono',monospace; color:var(--ink); }
#app { width:100%; max-width:480px; margin:0 auto; }
#map-wrap { background:#EEF2F8; border-bottom:1px solid var(--border); padding: 10px 0; }
#map-svg { display:block; width:100%; height:120px; }
.lista { padding: 20px; }
.t-card { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size: 13px; }
</style>
</head>
<body>
<div id="app">
  <div id="map-wrap">
    <svg id="map-svg" viewBox="0 0 360 120" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div class="lista" id="lista-treni"></div>
</div>

<script>
const STAZ=[
  {l:'Pinerolo', x:40}, {l:'None', x:120}, {l:'Vinovo', x:180}, {l:'Lingotto', x:300}
];

function renderMappa(treni, plChiuso) {
  const plCol = plChiuso ? '#C8321A' : '#1A7A3C';
  let h = '';
  
  // Sfondo pulito
  h += `<rect width="${MW}" height="${MH}" fill="#EEF2F8"/>`;

  // Linea ferroviaria (senza fronzoli)
  h += `<polyline points="${ptStr(RAIL_PTS)}" fill="none" stroke="#5C4A30" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>`;

  // Stazioni: punti microscopici (1.5px) e testo piccolo (6.5px) senza box
  STAZ.forEach(s => {
    const p = proj(s.lat, s.lon);
    h += `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="1.5" fill="#1C1814"/>`;
    h += `<text x="${(p.x + s.tx).toFixed(1)}" y="${(p.y + s.ty).toFixed(1)}" text-anchor="middle" font-size="6.5" fill="#5C5448" font-family="'DM Mono',monospace" font-weight="500">${s.label}</text>`;
  });

  // Vinovo P.L. - Pura grafica minimalista
  h += `<circle cx="${PL.x.toFixed(1)}" cy="${PL.y.toFixed(1)}" r="4.5" fill="${plCol}" stroke="white" stroke-width="1.2"/>`;

  // Treni: Solo il rettangolo colorato
  treni.slice(0, 6).forEach(t => {
    const pos = trainPos(t);
    if (!pos) return;
    const isMerci = t.tipo === 'Merci';
    const trainCol = isMerci ? '#8A4A10' : '#1A5A9A';
    
    h += `<rect x="${(pos.x - 14).toFixed(1)}" y="${(pos.y - 6).toFixed(1)}" width="28" height="12" rx="3" fill="${trainCol}" stroke="white" stroke-width="1"/>`;
    
    // Etichetta treno minimale
    if (t.min <= 45) {
      h += `<text x="${pos.x.toFixed(1)}" y="${(pos.y - 9).toFixed(1)}" text-anchor="middle" font-size="6" fill="${trainCol}" font-family="'DM Mono',monospace" font-weight="700">${t.numero}</text>`;
    }
  });

  document.getElementById('map-svg').innerHTML = h;
}

function aggiorna() {
  const treni = [
    {numero:'26202', tipo:'SFM2', min:10, dir:'Chivasso'},
    {numero:'MCi-01', tipo:'Merci', min:25, dir:'Pinerolo'}
  ];
  renderMappa(treni);
  document.getElementById('lista-treni').innerHTML = treni.map(t => `
    <div class="t-card">
      <span>${t.tipo} ${t.numero}</span>
      <strong>${t.min} min</strong>
    </div>`).join('');
}

setInterval(aggiorna, 5000);
aggiorna();
</script>
</body>
</html>
