<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>P.L. Vinovo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root { --paper:#F7F4EF; --ink:#1C1814; --blue:#1A5A9A; --merci:#8A4A10; --border:#D8D0C4; }
  body { margin:0; background:var(--paper); font-family:'DM Mono',monospace; color:var(--ink); }
  #app { width:100%; max-width:480px; margin:0 auto; display:flex; flex-direction:column; height:100dvh; }
  #map-wrap { background:#EEF2F8; border-bottom:1px solid var(--border); }
  #map-svg { display:block; width:100%; }
  .lista { flex:1; overflow-y:auto; padding:10px 20px; }
  .item { display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); font-size:12px; }
  .treno-tipo { font-weight:bold; }
  .treno-tipo.merci { color:var(--merci); }
</style>
</head>
<body>
<div id="app">
  <div id="map-wrap">
    <svg id="map-svg" viewBox="0 0 360 150" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div class="lista" id="lista-treni"></div>
</div>

<script>
const MW=360, MH=150;
const STAZ=[
  {label:'Pinerolo', x:20, y:75}, {label:'None', x:120, y:75}, 
  {label:'Vinovo', x:180, y:75}, {label:'Lingotto', x:300, y:75}
];

function renderMappa(treni) {
  let h = `<polyline points="20,75 340,75" fill="none" stroke="#5C4A30" stroke-width="1.5"/>`;
  
  // Stazioni: solo punti, niente riquadri
  STAZ.forEach(s => {
    h += `<circle cx="${s.x}" cy="${s.y}" r="1.5" fill="black"/>`;
    h += `<text x="${s.x}" y="${s.y+12}" text-anchor="middle" font-size="7" fill="#5C5448">${s.label}</text>`;
  });

  // Vinovo PL
  h += `<circle cx="180" cy="75" r="3" fill="red" stroke="white" stroke-width="1"/>`;

  // Treni: rettangolini puliti
  treni.forEach(t => {
    const x = 180 + (t.dir==='Chivasso' ? -t.min*2 : t.min*2);
    h += `<rect x="${x-6}" y="68" width="12" height="6" rx="1" fill="${t.tipo==='Merci'?'#8A4A10':'#1A5A9A'}"/>`;
  });
  document.getElementById('map-svg').innerHTML = h;
}

function aggiorna() {
  const treni = [
    {numero:'26202', tipo:'SFM2', min:10, dir:'Chivasso'},
    {numero:'MCi-01', tipo:'Merci', min:25, dir:'Pinerolo'}
  ];
  renderMappa(treni);
  document.getElementById('lista-treni').innerHTML = treni.map(t => `
    <div class="item">
      <span class="treno-tipo ${t.tipo==='Merci'?'merci':''}">${t.tipo} ${t.numero}</span>
      <span>${t.min} min · verso ${t.dir}</span>
    </div>
  `).join('');
}

setInterval(aggiorna, 5000);
aggiorna();
</script>
</body>
</html>
